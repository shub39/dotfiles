[font]
size = 11.0

[font.normal]
family = "GoogleSansCode"
style = "Regular"

[font.bold]
family = "GoogleSansCode"
style = "Bold"

[font.italic]
family = "GoogleSansCode"
style = "Italic"

[font.bold_italic]
family = "GoogleSansCode"
style = "Bold Italic"

[window]
decorations = "None"
opacity = 1.0

[bell]
animation = "EaseOutExpo"
color = "#d79921"
duration = 0

[colors.primary]
background = "#1d2021"
foreground = "#ebdbb2"

[colors.cursor]
text = "#282828"
cursor = "#d79921"

[colors.selection]
text = "#282828"
background = "#504945"

[colors.normal]
black = "#282828"
red = "#cc241d"
green = "#98971a"
yellow = "#d79921"
blue = "#458588"
magenta = "#b16286"
cyan = "#689d6a"
white = "#a89984"

[colors.bright]
black = "#928374"
red = "#fb4934"
green = "#b8bb26"
yellow = "#fabd2f"
blue = "#83a598"
magenta = "#d3869b"
cyan = "#8ec07c"
white = "#ebdbb2"
