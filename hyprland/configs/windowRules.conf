#Windowrules
windowrulev2 = nomaximizerequest, class:.* 

#Stop Flickering
windowrulev2 = stayfocused, title:^()$,class:^(steam|jetbrains-studio|jetbrains-idea-ce)$
windowrulev2 = minsize 1 1, title:^()$,class:^(steam|jetbrains-studio|jetbrains-idea-ce)$

#Opaque Windows
windowrulev2 = opaque,class:^(jetbrains-studio|kitty|jetbrains-idea-ce|librewolf-default)$

#Specific Workspace
windowrulev2 = workspace 3 silent, class:^(webcord)$
windowrulev2 = workspace 4 silent, class:^(org.telegram.desktop)$

#Floating windows
windowrulev2 = float, class:^(com.github.neithern.g4music|boxbuddy-rs|org.qbittorrent.qBittorrent)$
windowrulev2 = float, class:^(xdg-desktop-portal-gtk)$
windowrulev2 = float, class:^(steam|jetbrains-studio|jetbrains-idea-ce)$

#Size
windowrulev2 = size 30% 70%, class:^(com.github.neithern.g4music)$
windowrulev2 = size 70% 70%, class:^(steam)$
