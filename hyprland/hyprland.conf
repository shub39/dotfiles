# MY HYPRLAND CONFIG

# Default Programs
$terminal = kitty -c /home/shub/Programs/dotfiles/kitty/kitty.conf
$browser = librewolf  
$fileManager = nautilus
$menu = wofi --show drun
$discord = /usr/bin/distrobox-enter  -n archlinux -- /bin/sh -l -c  /usr/bin/discord
$whatsapp = zapzap
$telegram = telegram-desktop
$music = g4music

# Monitor
monitor=,preferred,auto,auto

# Autostart
exec-once = swaync -s /home/shub/Programs/dotfiles/swaync/style.css -c /home/shub/Programs/dotfiles/swaync/config.json
exec-once = swaybg -i /home/shub/Programs/dotfiles/skull-machine.jpg      
exec-once = waybar -c "/home/shub/Programs/dotfiles/waybar/configs/[TOP] Default" -s "/home/shub/Programs/dotfiles/waybar/style/[Colorful] Rainbow Spectrum.css"
exec-once = $terminal
exec-once = [workspace 2 silent] $browser
exec-once = [workspace 3 silent] $discord
exec-once = [workspace 4 silent] $whatsapp
exec-once = [workspace 4 silent] $telegram
exec-once = [workspace special:overveiw silent] $music
exec-once = /usr/lib/polkit-1
exec-once = /usr/libexec/xdg-desktop-portal-hyprland 
exec-once = /usr/libexec/xdg-desktop-portal 

# Some default env vars.
env = XCURSOR_SIZE,24
env = QT_QPA_PLATFORMTHEME,qt5ct # change to qt6ct if you have that

# Variables
input {

    kb_layout = us
    kb_variant =
    kb_model =
    kb_options =
    kb_rules =

    follow_mouse = 1

    touchpad {
        natural_scroll = no
    }

    sensitivity = 0 # -1.0 - 1.0, 0 means no modification.
}

general {

    gaps_in = 2
    gaps_out = 5
    border_size = 3
    col.active_border = rgb(ff9900) rgb(ff9900) 45deg
    col.inactive_border = rgb(1a0f00)
    layout = dwindle
    allow_tearing = false

}

decoration {

    rounding = 10
     
    blur {
        enabled = true
        size = 10
        passes = 1
    }

    drop_shadow = false
}

animations {

    enabled = yes
    bezier = myBezier, 0.05, 0.9, 0.1, 1.05
    animation = windows, 1, 7, myBezier
    animation = windowsOut, 1, 7, default, popin 80%
    animation = border, 1, 10, default
    animation = borderangle, 1, 8, default
    animation = fade, 1, 7, default
    animation = workspaces, 1, 6, default

}

dwindle {

    preserve_split = yes 

}

master {

    new_is_master = true

}

gestures {

    workspace_swipe = off

}

misc {

    force_default_wallpaper = 0

}

device:epic-mouse-v1 {

    sensitivity = -0.5

}


# Windowrules
windowrulev2 = nomaximizerequest, class:.* # You'll probably like this.
windowrulev2 = opacity 0.9 0.7,class:^(|jetbrains-studio|FreeTube|VSCodium|org.telegram.desktop|com.rtosta.zapzap|librewolf-default|org.gnome.Nautilus)$
windowrulev2 = opacity 0.8 0.5,class:^(kitty|discord|com.github.neithern.g4music)

# Keybinds
$mainMod = SUPER

bind = $mainMod, code:107, exec, hyprshot -o Pictures/Screenshots -m region
bind = $mainMod SHIFT, code:107, exec, hyprshot -o Pictures/Screenshots -m output
bind = $mainMod, Q, exec, $terminal
bind = $mainMod SHIFT, Q, exec, gnome-terminal
bind = $mainMod, C, killactive, 
bind = $mainMod, L, exec, wlogout
bind = $mainMod, W, exec, $fileManager
bind = $mainMod, Z, exec, $browser
bind = $mainMod SHIFT, W, exec, killall swaync && swaync -s /home/shub/Programs/dotfiles/swaync/style.css -c /home/shub/Programs/dotfiles/swaync/config.json
bind = $mainMod, S, exec, killall scrcpy || scrcpy --no-video
bind = $mainMod SHIFT, S, exec, killall scrcpy
bind = $mainMod SHIFT, V, togglefloating, 
bind = $mainMod, SPACE, exec, $menu
bind = $mainMod SHIFT, R, togglesplit,
bind = $mainMod, A, exec, $music
bind =, XF86AudioRaiseVolume, exec, wpctl set-volume -l 1.4 @DEFAULT_AUDIO_SINK@ 5%+
bind =, XF86AudioLowerVolume, exec, wpctl set-volume -l 1.4 @DEFAULT_AUDIO_SINK@ 5%-
bind =, XF86AudioMute, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle 

bind = ALT, TAB, cyclenext

bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9
bind = $mainMod, 0, workspace, 10

# Move active window to a workspace with mainMod + SHIFT + [0-9]
bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5
bind = $mainMod SHIFT, 6, movetoworkspace, 6
bind = $mainMod SHIFT, 7, movetoworkspace, 7
bind = $mainMod SHIFT, 8, movetoworkspace, 8
bind = $mainMod SHIFT, 9, movetoworkspace, 9
bind = $mainMod SHIFT, 0, movetoworkspace, 10

# Example special workspace (scratchpad)
bind = $mainMod, code:49, togglespecialworkspace, overveiw
bind = $mainMod SHIFT, code:49, movetoworkspace, special:overveiw

bind = $mainMod, code:67, togglespecialworkspace, videos
bind = $mainMod SHIFT, code:67, movetoworkspace, special:videos

# Scroll through existing workspaces with mainMod + scroll
bind = $mainMod, mouse_down, workspace, e+1
bind = $mainMod, mouse_up, workspace, e-1

# Move/resize windows with mainMod + LMB/RMB and dragging
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow

bind = SUPER SHIFT, left, movewindow, l
bind = SUPER SHIFT, right, movewindow, r
bind = SUPER SHIFT, up, movewindow, u
bind = SUPER SHIFT, down, movewindow, d 

bind = $mainMod , right, resizeactive, 20 0
bind = $mainMod , left, resizeactive, -20 0
bind = $mainMod , up, resizeactive, 0 -20
bind = $mainMod , down, resizeactive, 0 20
